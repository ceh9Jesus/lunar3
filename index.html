document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt);margin-bottom:30px;font-weight:500;\">Premium Vape Store<\u002Fdiv>\n        <p style=\"font-size:15px;color:var(--muted);line-height:1.6;max-width:280px;margin-bottom:30px;\">Магазин для совершеннолетних. Подтверди, что тебе <strong style=\"color:#fff;font-weight:600;\">18 лет и больше<\u002Fstrong>.<\u002Fp>\n        <div onclick=\"{{ enter }}\" style=\"width:100%;max-width:300px;padding:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--ink);font-size:16px;font-weight:700;border-radius:16px;cursor:pointer;margin-bottom:12px;box-shadow:0 8px 30px var(--glow);animation:ctaGlow 2.6s ease-in-out infinite;transition:transform .14s ease;\" style-active=\"transform:scale(.97)\">Мне есть 18 — продолжить<\u002Fdiv>\n        <div onclick=\"{{ deny }}\" style=\"width:100%;max-width:300px;padding:15px;color:var(--muted);font-size:14px;border:1px solid var(--border2);border-radius:16px;cursor:pointer;transition:transform .14s ease;\" style-active=\"transform:scale(.97)\">Мне нет 18<\u002Fdiv>\n        <div style=\"margin-top:28px;font-size:11px;color:var(--muted2);max-width:280px;line-height:1.5;\">Никотин вызывает зависимость. Продажа только лицам 18+.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- DENIED -->\n    <sc-if value=\"{{ showDenied }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;z-index:75;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px;border-radius:44px;\">\n        <div style=\"font-size:52px;margin-bottom:20px;\">🔞<\u002Fdiv>\n        <h1 style=\"font-size:24px;font-weight:700;color:#fff;margin-bottom:12px;\">Доступ закрыт<\u002Fh1>\n        <p style=\"font-size:15px;color:var(--muted);\">Магазин только для совершеннолетних.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- SPLASH -->\n    <sc-if value=\"{{ showSplash }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:44px;\">\n        <div style=\"width:90px;height:90px;border-radius:24px;background:var(--card2);animation:floaty 4s ease-in-out infinite;box-shadow:0 0 40px var(--glow);\"><\u002Fdiv>\n        <div style=\"font-size:13px;letter-spacing:6px;color:var(--accent);margin-top:24px;font-weight:600;\">LUNAR<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:470,&quot;height&quot;:940},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Deep Space&quot;,&quot;Nebula&quot;,&quot;Aurora&quot;],&quot;default&quot;:&quot;Nebula&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const rnd = (n)=>Math.random()*n;\n    const saved = this.loadSaved();\n    this.state = {\n      ready:false, products:[], logo:'',\n      entered:saved.entered||false, denied:false,\n      screen:'catalog',\n      selectedId:null, detailFlavorIdx:null, detailQty:1,\n      cart:saved.cart||[], orders:saved.orders||[],\n      form:saved.form||{name:'',phone:'',address:'',comment:''},\n      addresses:saved.addresses||[],\n      formError:false, formErrorText:'',\n      showSuccess:false,\n      flying:null,\n      stars:Array.from({length:26},()=>({l:rnd(100),t:rnd(100),s:rnd(2)+1,d:rnd(4)})),\n    };\n  }\n  loadSaved(){\n    try { return JSON.parse(localStorage.getItem('lunar_state')||'{}'); } catch(e){ return {}; }\n  }\n  persist(){\n    try {\n      const {cart,orders,form,addresses,entered} = this.state;\n      localStorage.setItem('lunar_state', JSON.stringify({cart,orders,form,addresses,entered}));\n    } catch(e){}\n  }\n  componentDidUpdate(){ this.persist(); }\n  componentDidMount(){\n    const tryLoad = ()=>{\n      if(window.LUNAR_DATA){\n        this.setState({ready:true, products:window.LUNAR_DATA.PRODUCTS, logo:window.LUNAR_DATA.LOGO});\n      } else { this._t = setTimeout(tryLoad, 60); }\n    };\n    tryLoad();\n  }\n  componentWillUnmount(){ if(this._t) clearTimeout(this._t); if(this._ft) clearTimeout(this._ft); }\n\n  themes(){\n    return {\n      'Deep Space':{bg:'#080D1F',bg2:'#0B1226',card:'#0F1730',card2:'#16203C',accent:'#8CAFE6',accent2:'#6E97D6',glow:'rgba(140,175,230,0.18)',muted:'#8295BC',muted2:'#54648A',border:'rgba(140,175,230,0.12)',border2:'rgba(140,175,230,0.28)',success:'#5BD39A',ink:'#0A1228'},\n      'Nebula':{bg:'#0E0A1F',bg2:'#140C26',card:'#1A1233',card2:'#241640',accent:'#B98CE6',accent2:'#9E6ED6',glow:'rgba(185,140,230,0.18)',muted:'#A795BC',muted2:'#6A548A',border:'rgba(185,140,230,0.12)',border2:'rgba(185,140,230,0.28)',success:'#5BD39A',ink:'#160A28'},\n      'Aurora':{bg:'#06130F',bg2:'#0A1A14',card:'#0E2018',card2:'#142C20',accent:'#6FD6A8',accent2:'#4FB98A',glow:'rgba(111,214,168,0.18)',muted:'#82BCA0',muted2:'#548A6E',border:'rgba(111,214,168,0.12)',border2:'rgba(111,214,168,0.28)',success:'#5BD39A',ink:'#062014'},\n    };\n  }\n\n  fmt(n){ return n.toLocaleString('ru')+' \\u20b8'; }\n  goods(){ return this.state.cart.reduce((s,c)=>s+c.qty*c.price,0); }\n  total(){ return this.state.cart.length ? this.goods()+1000 : 0; }\n\n  openProduct(id){ this.setState({selectedId:id, detailFlavorIdx:null, detailQty:1, screen:'product'}); }\n  addToCart(){\n    const p = this.state.products.find(x=>x.id===this.state.selectedId);\n    if(!p || this.state.detailFlavorIdx==null) return;\n    const f = p.flavors[this.state.detailFlavorIdx];\n    const cart = this.state.cart.map(c=>({...c}));\n    const ex = cart.find(c=>c.id===p.id && c.flavor===f.n);\n    if(ex) ex.qty += this.state.detailQty;\n    else cart.push({id:p.id,name:p.name,img:p.img,price:p.price,flavor:f.n,qty:this.state.detailQty});\n    this.setState({cart, screen:'catalog', flying:{img:p.img, n:Date.now()}});\n    if(this._ft) clearTimeout(this._ft);\n    this._ft = setTimeout(()=>this.setState({flying:null}), 820);\n  }\n  removeRow(i){ const cart=this.state.cart.slice(); cart.splice(i,1); this.setState({cart}); }\n  rowQty(i,d){ const cart=this.state.cart.map(c=>({...c})); cart[i].qty=Math.max(1,Math.min(20,cart[i].qty+d)); this.setState({cart}); }\n  setField(k,v){ this.setState(s=>({form:{...s.form,[k]:v}, formError:false})); }\n\n  submitOrder(){\n    const {name,phone,address} = this.state.form;\n    if(!name.trim()||!phone.trim()||!address.trim()){\n      this.setState({formError:true, formErrorText:'Заполни имя, телефон и адрес доставки'});\n      return;\n    }\n    if(!this.state.cart.length) return;\n    const now = new Date();\n    const dd = now.toLocaleDateString('ru',{day:'2-digit',month:'long'})+', '+now.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});\n    const order = {\n      id:Date.now(),\n      items:this.state.cart.map(c=>({name:c.name,flavor:c.flavor,qty:c.qty,price:c.price})),\n      count:this.state.cart.reduce((s,c)=>s+c.qty,0),\n      total:this.total(), date:dd,\n    };\n    const addr = address.trim();\n    const addresses = this.state.addresses.includes(addr) ? this.state.addresses : [addr, ...this.state.addresses].slice(0,5);\n    this.setState({orders:[order,...this.state.orders], cart:[], showSuccess:true, addresses});\n  }\n\n  renderVals(){\n    const s = this.state;\n    const c = this.themes()[this.props.theme || 'Nebula'] || this.themes()['Nebula'];\n    const rootStyle = {\n      position:'relative', width:'390px', height:'844px', borderRadius:'44px', overflow:'hidden',\n      background:c.bg, boxShadow:'0 50px 100px rgba(0,0,0,0.55), 0 0 0 10px #05060c, 0 0 0 11px rgba(255,255,255,0.06)',\n      fontFamily:\"'Poppins',sans-serif\", flexShrink:0,\n      '--bg':c.bg,'--bg2':c.bg2,'--card':c.card,'--card2':c.card2,'--accent':c.accent,'--accent2':c.accent2,\n      '--glow':c.glow,'--muted':c.muted,'--muted2':c.muted2,'--border':c.border,'--border2':c.border2,'--success':c.success,'--ink':c.ink,\n    };\n    const logoBg = {width:'100%',height:'100%',backgroundImage:`url(\"${s.logo}\")`,backgroundSize:'cover',backgroundPosition:'center',borderRadius:'inherit'};\n    const stars = s.stars.map(st=>({style:{position:'absolute',left:st.l+'%',top:st.t+'%',width:st.s+'px',height:st.s+'px',borderRadius:'50%',background:'var(--accent)',opacity:0,animation:`twinkle 4s ${st.d}s infinite ease-in-out`}}));\n\n    const screen = s.screen;\n    const isCatalog = s.ready && screen==='catalog';\n    const isProduct = s.ready && screen==='product';\n    const isCart = s.ready && screen==='cart';\n    const isCheckout = s.ready && screen==='checkout';\n    const isOrders = s.ready && screen==='orders';\n    const isProfile = s.ready && screen==='profile';\n    const isAddresses = s.ready && screen==='addresses';\n    const isAbout = s.ready && screen==='about';\n\n    const cards = s.products.map((p,i)=>({\n      id:p.id, name:p.name, puffs:p.puffs, tag:p.tag, img:p.img,\n      price:this.fmt(p.price),\n      flavorCount:p.flavors.length+' вкусов',\n      dots:p.flavors.slice(0,5).map(f=>({style:{width:'9px',height:'9px',borderRadius:'50%',flexShrink:0,background:f.c}})),\n      imgBg:{height:'138px',width:'80%',backgroundImage:`url(\"${p.img}\")`,backgroundSize:'contain',backgroundRepeat:'no-repeat',backgroundPosition:'center',filter:'drop-shadow(0 14px 20px rgba(0,0,0,.5))'},\n      inCart:s.cart.some(x=>x.id===p.id),\n      cardStyle:{background:'linear-gradient(180deg,var(--card),var(--bg2))',border:'1px solid '+(s.cart.some(x=>x.id===p.id)?'var(--border2)':'var(--border)'),borderRadius:'20px',overflow:'hidden',display:'flex',flexDirection:'column',cursor:'pointer',boxShadow:s.cart.some(x=>x.id===p.id)?'0 0 0 1px var(--border2)':'none',transition:'transform .15s ease, box-shadow .2s ease',animation:`cardIn .5s cubic-bezier(.2,.8,.3,1) ${(i*0.06).toFixed(2)}s backwards`},\n      open:()=>this.openProduct(p.id),\n    }));\n\n    const p = s.products.find(x=>x.id===s.selectedId);\n    let detail = null;\n    if(p){\n      const canAdd = s.detailFlavorIdx!=null;\n      detail = {\n        name:p.name, puffs:p.puffs, tag:p.tag, price:this.fmt(p.price), qty:s.detailQty,\n        imgBg:{height:'200px',width:'70%',backgroundImage:`url(\"${p.img}\")`,backgroundSize:'contain',backgroundRepeat:'no-repeat',backgroundPosition:'center',filter:'drop-shadow(0 18px 26px rgba(0,0,0,.55))'},\n        flavors:p.flavors.map((f,i)=>{\n          const chosen = s.detailFlavorIdx===i;\n          return {\n            name:f.n, chosen,\n            itemStyle:{display:'flex',alignItems:'center',gap:'13px',padding:'13px 15px',background:chosen?'var(--glow)':'var(--card)',border:'1px solid '+(chosen?'var(--accent)':'var(--border)'),borderRadius:'14px',cursor:'pointer',transition:'background .2s ease, border-color .2s ease, transform .14s ease'},\n            circleStyle:{width:'30px',height:'30px',borderRadius:'50%',flexShrink:0,background:f.c,boxShadow:chosen?'inset 0 0 0 1px rgba(255,255,255,.12), 0 0 14px '+f.c:'inset 0 0 0 1px rgba(255,255,255,.12)',transition:'box-shadow .25s ease'},\n            checkStyle:{width:'24px',height:'24px',borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid '+(chosen?'var(--accent)':'var(--muted2)'),background:chosen?'var(--accent)':'transparent',transition:'border-color .2s ease',animation:chosen?'flavorPop .35s ease':'none'},\n            select:()=>this.setState({detailFlavorIdx:i}),\n          };\n        }),\n        addLabel: canAdd?'Добавить в корзину':'Сначала выбери вкус',\n        addStyle:{padding:'17px',background:'linear-gradient(135deg,var(--accent),var(--accent2))',color:'var(--ink)',fontSize:'16px',fontWeight:700,borderRadius:'15px',textAlign:'center',cursor:canAdd?'pointer':'not-allowed',opacity:canAdd?1:0.4,boxShadow:canAdd?'0 8px 28px var(--glow)':'none',transition:'transform .14s ease, opacity .25s ease',animation:canAdd?'ctaGlow 2.6s ease-in-out infinite':'none'},\n        inc:()=>this.setState(st=>({detailQty:Math.min(20,st.detailQty+1)})),\n        dec:()=>this.setState(st=>({detailQty:Math.max(1,st.detailQty-1)})),\n        add:()=>this.addToCart(),\n      };\n    }\n\n    const cartRows = s.cart.map((c2,i)=>({\n      name:c2.name, flavor:c2.flavor, qty:c2.qty, line:this.fmt(c2.qty*c2.price),\n      imgBg:{width:'50px',height:'50px',borderRadius:'11px',background:'var(--card2)',flexShrink:0,backgroundImage:`url(\"${c2.img}\")`,backgroundSize:'76%',backgroundRepeat:'no-repeat',backgroundPosition:'center'},\n      remove:()=>this.removeRow(i), inc:()=>this.rowQty(i,1), dec:()=>this.rowQty(i,-1),\n    }));\n    const cartCount = s.cart.reduce((a,b)=>a+b.qty,0);\n    const cartHasItems = s.cart.length>0;\n\n    const orderRows = s.orders.map(o=>({\n      date:o.date, status:'Принят', count:o.count+' поз.', total:this.fmt(o.total),\n      items:o.items.map(it=>it.name+' · '+it.flavor+' ×'+it.qty).join('\\n'),\n    }));\n    const totalSpent = s.orders.reduce((a,o)=>a+o.total,0);\n\n    const tabBase = {flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',cursor:'pointer',fontSize:'10px',fontWeight:600,letterSpacing:'.3px',background:'none',border:'none',fontFamily:'inherit',transition:'transform .14s ease, color .2s ease'};\n    const tab=(active)=>({...tabBase,color:active?'var(--accent)':'var(--muted2)'});\n\n    const flyStyle = s.flying ? {position:'absolute',left:'50%',top:'285px',width:'72px',height:'72px',marginLeft:'-36px',zIndex:36,backgroundImage:`url(\"${s.flying.img}\")`,backgroundSize:'contain',backgroundRepeat:'no-repeat',backgroundPosition:'center',pointerEvents:'none',filter:'drop-shadow(0 12px 20px rgba(0,0,0,.55))',animation:'flyToCart .8s cubic-bezier(.55,.06,.68,.99) forwards'} : null;\n    const cartTabStyle = {...tab(isCart)};\n    const cartIconStyle = s.flying ? {position:'relative',animation:'tabPulse .5s ease .5s'} : {position:'relative'};\n\n    return {\n      rootStyle, stars, logo:s.logo, logoBg, contentPad: (isProduct||isCheckout)?'104px':( (screen==='catalog'||screen==='cart'||screen==='orders'||screen==='profile'||screen==='addresses')?'96px':'24px'),\n      isCatalog, isProduct, isCart, isCheckout, isOrders, isProfile, isAddresses, isAbout,\n      addressRows: s.addresses.map((a,i)=>({text:a, primary:i===0})),\n      addressesEmpty: s.addresses.length===0,\n      cards, detail,\n      cartRows, cartHasItems, cartEmpty:!cartHasItems,\n      cartSubtitle: cartHasItems ? (cartCount+' поз. · '+this.fmt(this.goods())) : 'пусто',\n      sumGoods:this.fmt(this.goods()), sumDeliv:this.fmt(1000), sumTotal:this.fmt(this.total()),\n      cartCount, cartCountShow:cartCount>0,\n      orderRows, ordersHas:s.orders.length>0, ordersEmpty:s.orders.length===0,\n      ordersSubtitle: s.orders.length? (s.orders.length+' '+(s.orders.length===1?'заказ':'заказа')) : 'история пуста',\n      profileName: s.form.name.trim()||'Гость LUNAR',\n      profilePhone: s.form.phone.trim()||'Телефон не указан',\n      profileOrders: s.orders.length, profileSpent:this.fmt(totalSpent),\n      form:s.form,\n      setName:(e)=>this.setField('name',e.target.value),\n      setPhone:(e)=>this.setField('phone',e.target.value),\n      setAddress:(e)=>this.setField('address',e.target.value),\n      setComment:(e)=>this.setField('comment',e.target.value),\n      formError:s.formError, formErrorText:s.formErrorText,\n      submitOrder:()=>this.submitOrder(),\n      goBack:()=>this.setState({screen:'catalog'}),\n      goCatalog:()=>this.setState({screen:'catalog', showSuccess:false}),\n      goCart:()=>this.setState({screen:'cart'}),\n      goCheckout:()=>this.setState({screen:'checkout'}),\n      goOrders:()=>this.setState({screen:'orders'}),\n      goProfile:()=>this.setState({screen:'profile'}),\n      goAddresses:()=>this.setState({screen:'addresses'}),\n      goAbout:()=>this.setState({screen:'about'}),\n      openSupport:()=>{ window.open('https://t.me/lunar_shop_kst','_blank'); },\n      enter:()=>this.setState({entered:true}),\n      deny:()=>this.setState({denied:true}),\n      productCTA:isProduct, checkoutCTA:isCheckout && cartHasItems,\n      navVisible: s.ready && s.entered && !s.denied && !s.showSuccess && (screen==='catalog'||screen==='cart'||screen==='orders'||screen==='profile'||screen==='addresses'||screen==='about'),\n      tabCatalog:tab(isCatalog), tabCart:cartTabStyle, tabOrders:tab(isOrders), tabProfile:tab(isProfile||isAddresses||isAbout),\n      flying:!!s.flying, flyStyle, cartIconStyle,\n      showSuccess:s.showSuccess,\n      showGate: s.ready && !s.entered && !s.denied,\n      showDenied: s.denied,\n      showSplash: !s.ready,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
